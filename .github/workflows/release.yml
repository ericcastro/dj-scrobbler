name: Release

# Triggers on version tags: git tag v0.4.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Delete any existing draft release so re-runs don't hit 422 on .blockmap ──
  delete-draft:
    runs-on: ubuntu-latest
    steps:
      - name: Delete existing draft release for this tag (if any)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases \
            --jq ".[] | select(.tag_name==\"$TAG\" and .draft==true) | .id" | head -1)
          if [ -n "$RELEASE_ID" ]; then
            echo "Deleting draft release $RELEASE_ID for $TAG"
            gh api -X DELETE repos/${{ github.repository }}/releases/$RELEASE_ID
          else
            echo "No existing draft release found for $TAG"
          fi

  # ── macOS ─────────────────────────────────────────────────────────────────────
  build-mac:
    needs: delete-draft
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (macOS)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Disable certificate auto-discovery — afterPack.js handles ad-hoc
          # signing instead, which fixes the "different Team IDs" crash on macOS 15.
          # When real code-signing + notarization is set up, uncomment these and
          # remove the afterPack hook (or gate it on CSC_LINK being unset).
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          # CSC_LINK: ${{ secrets.MAC_CERTIFICATE }}
          # CSC_KEY_PASSWORD: ${{ secrets.MAC_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npm run build:mac -- --publish always

  # ── Windows ───────────────────────────────────────────────────────────────────
  build-win:
    needs: delete-draft
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Windows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:win -- --publish always

  # ── Linux ─────────────────────────────────────────────────────────────────────
  build-linux:
    needs: delete-draft
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build & publish (Linux)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run build:linux -- --publish always
